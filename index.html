<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPFlix</title>
    <link rel="icon" href="assets/logo_hpflix_transparente-removebg-preview2.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <div class="page-head">
                <img class="brand-logo" src="assets/logo_hpflix_transparente-removebg-preview2.png" alt="HPFlix logo">
                <div>
                    <h1>Qual casa está assistindo?</h1>
                    <p>Escolha um perfil para continuar e acessar o conteúdo da sua casa.</p>
                </div>
                <button id="theme-toggle" type="button" aria-label="Alternar modo claro e escuro" class="theme-toggle">
                    <img src="assets/lamp-off.svg" alt="Lâmpada desligada">
                </button>
            </div>
        </header>

        <section class="profiles" aria-label="Perfis de casa">
            <ul>
                <li>
                    <a class="profile-link" href="catalogo/catalogo.html" data-profile-name="Grifinória" data-profile-img="assets/perfil_1_brasao_grifinoria2.png">
                        <img src="assets/perfil_1_brasao_grifinoria2.png" alt="Brasão Grifinória">
                        <span>Grifinória</span>
                    </a>
                </li>
                <li>
                    <a class="profile-link" href="catalogo/catalogo.html" data-profile-name="Sonserina" data-profile-img="assets/perfil_2_brasao_sonserina2.png">
                        <img src="assets/perfil_2_brasao_sonserina2.png" alt="Brasão Sonserina">
                        <span>Sonserina</span>
                    </a>
                </li>
                <li>
                    <a class="profile-link" href="catalogo/catalogo.html" data-profile-name="Corvinal" data-profile-img="assets/perfil_3_brasao_corvinal.webp">
                        <img src="assets/perfil_3_brasao_corvinal.webp" alt="Brasão Corvinal">
                        <span>Corvinal</span>
                    </a>
                </li>
                <li>
                    <a class="profile-link" href="catalogo/catalogo.html" data-profile-name="Lufa-Lufa" data-profile-img="assets/perfil_4_brasao_lufa_lufa.webp">
                        <img src="assets/perfil_4_brasao_lufa_lufa.webp" alt="Brasão Lufa-Lufa">
                        <span>Lufa-Lufa</span>
                    </a>
                </li>
            </ul>
        </section>
    </main>
    <audio id="intro-audio" src="assets/intro_hpflix.mp3" preload="auto" autoplay></audio>
    <script src="app.js"></script>
</body>
</html>
